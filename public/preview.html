<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Slinkto – Logo Preview</title>
  <style>
    body { background:#1e1e1e; margin:0; padding:48px; display:flex; flex-direction:column; gap:48px; font-family:'Segoe UI',Arial,sans-serif; align-items:flex-start; }
    .row { display:flex; gap:32px; align-items:flex-end; flex-wrap:wrap; }
    .card { display:flex; flex-direction:column; align-items:center; gap:10px; color:#666; font-size:12px; letter-spacing:.5px; }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════ -->
  <!--  LOGO HORIZONTAL                   -->
  <!-- ═══════════════════════════════════ -->
  <div class="card" style="align-items:flex-start">
    <svg width="500" height="125" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="800" height="200" rx="24" fill="#111111"/>
      <defs>
        <clipPath id="lt0"><rect x="-200" y="-200" width="400" height="200"/></clipPath>
        <clipPath id="lb0"><rect x="-200" y="0"    width="400" height="200"/></clipPath>
      </defs>
      <g transform="translate(100,100) rotate(-45) scale(0.27)">
        <rect x="-285" y="-152" width="380" height="190" rx="95" ry="95"
              fill="none" stroke="#E53935" stroke-width="68" clip-path="url(#lb0)"/>
        <rect x="-95"  y="-38"  width="380" height="190" rx="95" ry="95"
              fill="none" stroke="#E53935" stroke-width="68"/>
        <rect x="-285" y="-152" width="380" height="190" rx="95" ry="95"
              fill="none" stroke="#E53935" stroke-width="68" clip-path="url(#lt0)"/>
      </g>
      <text x="190" y="132"
            font-family="'Segoe UI',Arial,sans-serif"
            font-weight="700" font-size="90"
            fill="white" letter-spacing="-3">Slinkto</text>
    </svg>
    <span>Logo horizontal</span>
  </div>

  <!-- ═══════════════════════════════════ -->
  <!--  ICÔNES                             -->
  <!-- ═══════════════════════════════════ -->
  <div class="row">

    <!-- 1024px -->
    <div class="card">
      <svg width="220" height="220" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
        <rect width="1024" height="1024" rx="200" fill="#111111"/>
        <defs>
          <clipPath id="t1"><rect x="-320" y="-320" width="640" height="320"/></clipPath>
          <clipPath id="b1"><rect x="-320" y="0"    width="640" height="320"/></clipPath>
        </defs>
        <g transform="translate(512,512) rotate(-45)">
          <rect x="-285" y="-152" width="380" height="190" rx="95" ry="95"
                fill="none" stroke="#E53935" stroke-width="68" clip-path="url(#b1)"/>
          <rect x="-95"  y="-38"  width="380" height="190" rx="95" ry="95"
                fill="none" stroke="#E53935" stroke-width="68"/>
          <rect x="-285" y="-152" width="380" height="190" rx="95" ry="95"
                fill="none" stroke="#E53935" stroke-width="68" clip-path="url(#t1)"/>
        </g>
      </svg>
      <span>1024 × 1024</span>
    </div>

    <!-- 192px -->
    <div class="card">
      <svg width="192" height="192" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
        <rect width="1024" height="1024" rx="200" fill="#111111"/>
        <defs>
          <clipPath id="t2"><rect x="-320" y="-320" width="640" height="320"/></clipPath>
          <clipPath id="b2"><rect x="-320" y="0"    width="640" height="320"/></clipPath>
        </defs>
        <g transform="translate(512,512) rotate(-45)">
          <rect x="-285" y="-152" width="380" height="190" rx="95" ry="95"
                fill="none" stroke="#E53935" stroke-width="68" clip-path="url(#b2)"/>
          <rect x="-95"  y="-38"  width="380" height="190" rx="95" ry="95"
                fill="none" stroke="#E53935" stroke-width="68"/>
          <rect x="-285" y="-152" width="380" height="190" rx="95" ry="95"
                fill="none" stroke="#E53935" stroke-width="68" clip-path="url(#t2)"/>
        </g>
      </svg>
      <span>192 × 192</span>
    </div>

    <!-- 96px -->
    <div class="card">
      <svg width="96" height="96" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
        <rect width="1024" height="1024" rx="200" fill="#111111"/>
        <defs>
          <clipPath id="t3"><rect x="-320" y="-320" width="640" height="320"/></clipPath>
          <clipPath id="b3"><rect x="-320" y="0"    width="640" height="320"/></clipPath>
        </defs>
        <g transform="translate(512,512) rotate(-45)">
          <rect x="-285" y="-152" width="380" height="190" rx="95" ry="95"
                fill="none" stroke="#E53935" stroke-width="68" clip-path="url(#b3)"/>
          <rect x="-95"  y="-38"  width="380" height="190" rx="95" ry="95"
                fill="none" stroke="#E53935" stroke-width="68"/>
          <rect x="-285" y="-152" width="380" height="190" rx="95" ry="95"
                fill="none" stroke="#E53935" stroke-width="68" clip-path="url(#t3)"/>
        </g>
      </svg>
      <span>96 × 96</span>
    </div>

    <!-- 48px -->
    <div class="card">
      <svg width="48" height="48" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
        <rect width="1024" height="1024" rx="200" fill="#111111"/>
        <defs>
          <clipPath id="t4"><rect x="-320" y="-320" width="640" height="320"/></clipPath>
          <clipPath id="b4"><rect x="-320" y="0"    width="640" height="320"/></clipPath>
        </defs>
        <g transform="translate(512,512) rotate(-45)">
          <rect x="-285" y="-152" width="380" height="190" rx="95" ry="95"
                fill="none" stroke="#E53935" stroke-width="68" clip-path="url(#b4)"/>
          <rect x="-95"  y="-38"  width="380" height="190" rx="95" ry="95"
                fill="none" stroke="#E53935" stroke-width="68"/>
          <rect x="-285" y="-152" width="380" height="190" rx="95" ry="95"
                fill="none" stroke="#E53935" stroke-width="68" clip-path="url(#t4)"/>
        </g>
      </svg>
      <span>48 × 48</span>
    </div>

  </div>

</body>
</html>
