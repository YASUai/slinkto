<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Slinkto - Icon Preview</title>
  <style>
    body { background: #333; display: flex; gap: 40px; padding: 40px; flex-wrap: wrap; align-items: center; font-family: sans-serif; }
    .card { display: flex; flex-direction: column; align-items: center; gap: 12px; color: white; }
    label { font-size: 13px; opacity: 0.6; }
  </style>
</head>
<body>

  <!-- App Icon 1024x1024 -->
  <div class="card">
    <svg width="200" height="200" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <rect width="1024" height="1024" rx="200" fill="#111"/>
      <g transform="translate(512,512) rotate(-45)">
        <!-- Link 1 top -->
        <path d="M -100,-50 L 100,-50 A 100,100 0 0 1 100,-250 L -100,-250 A 100,100 0 0 1 -100,-50 Z"
              fill="none" stroke="#E53935" stroke-width="62" stroke-linejoin="round"/>
        <!-- Link 2 bottom -->
        <path d="M -100,50 L 100,50 A 100,100 0 0 0 100,250 L -100,250 A 100,100 0 0 0 -100,50 Z"
              fill="none" stroke="#E53935" stroke-width="62" stroke-linejoin="round"/>
        <!-- Interlock: hide top of link2 -->
        <rect x="-168" y="50" width="336" height="95" fill="#111"/>
        <!-- Interlock: redraw left/right bars of link2 -->
        <line x1="-131" y1="50" x2="-131" y2="150" stroke="#E53935" stroke-width="62"/>
        <line x1="131" y1="50" x2="131" y2="150" stroke="#E53935" stroke-width="62"/>
      </g>
    </svg>
    <label>App Icon (1024px)</label>
  </div>

  <!-- Small icon 48px -->
  <div class="card">
    <svg width="48" height="48" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <rect width="1024" height="1024" rx="200" fill="#111"/>
      <g transform="translate(512,512) rotate(-45)">
        <path d="M -100,-50 L 100,-50 A 100,100 0 0 1 100,-250 L -100,-250 A 100,100 0 0 1 -100,-50 Z"
              fill="none" stroke="#E53935" stroke-width="62" stroke-linejoin="round"/>
        <path d="M -100,50 L 100,50 A 100,100 0 0 0 100,250 L -100,250 A 100,100 0 0 0 -100,50 Z"
              fill="none" stroke="#E53935" stroke-width="62" stroke-linejoin="round"/>
        <rect x="-168" y="50" width="336" height="95" fill="#111"/>
        <line x1="-131" y1="50" x2="-131" y2="150" stroke="#E53935" stroke-width="62"/>
        <line x1="131" y1="50" x2="131" y2="150" stroke="#E53935" stroke-width="62"/>
      </g>
    </svg>
    <label>Small (48px)</label>
  </div>

  <!-- Full Logo with text -->
  <div class="card">
    <svg width="300" height="80" viewBox="0 0 750 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="750" height="200" rx="20" fill="#111"/>
      <!-- Icon small -->
      <g transform="translate(90,100) rotate(-45)">
        <path d="M -38,-20 L 38,-20 A 38,38 0 0 1 38,-96 L -38,-96 A 38,38 0 0 1 -38,-20 Z"
              fill="none" stroke="#E53935" stroke-width="24"/>
        <path d="M -38,20 L 38,20 A 38,38 0 0 0 38,96 L -38,96 A 38,38 0 0 0 -38,20 Z"
              fill="none" stroke="#E53935" stroke-width="24"/>
        <rect x="-64" y="20" width="128" height="36" fill="#111"/>
        <line x1="-50" y1="20" x2="-50" y2="56" stroke="#E53935" stroke-width="24"/>
        <line x1="50" y1="20" x2="50" y2="56" stroke="#E53935" stroke-width="24"/>
      </g>
      <!-- Text -->
      <text x="175" y="122" font-family="'Segoe UI', Arial, sans-serif" font-weight="700"
            font-size="80" fill="white" letter-spacing="-2">Slinkto</text>
    </svg>
    <label>Logo horizontal</label>
  </div>

</body>
</html>
